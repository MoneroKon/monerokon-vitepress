<svg width="320" height="320" viewBox="180 50 320 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>This Week in Monero ornamented stack logo (CypherGoat palette, large title)</title>
<desc>Stacked TWIM logo with asymmetric, organic rim ornamentation, themed in the CypherGoat black-and-white palette. Larger title.</desc>

<defs>
  <clipPath id="cropOrn"><circle cx="340" cy="210" r="160"/></clipPath>
  <!-- Concentric arc for bottom text, horizontal endpoints, wider span -->
  <path id="bottom-arc" d="M 231.8 285.7 A 132 132 0 0 0 448.2 285.7" fill="none"/>
  <!-- Mask for divider gaps — rebuilt around the new, larger text positions -->
  <mask id="text-gaps" maskUnits="userSpaceOnUse">
    <rect x="0" y="0" width="680" height="420" fill="white"/>
    <!-- WEEKLY DIGEST -->
    <rect x="266" y="118" width="148" height="18" fill="black" rx="2"/>
    <!-- This Week (52px, centered around y≈193) -->
    <rect x="220" y="156" width="240" height="56" fill="black" rx="2"/>
    <!-- in Monero (52px, centered around y≈246) -->
    <rect x="220" y="208" width="240" height="56" fill="black" rx="2"/>
    <!-- T · W · I · M -->
    <rect x="270" y="282" width="140" height="20" fill="black" rx="2"/>
    <!-- Whole bottom-block padding (used elsewhere) -->
    <rect x="218" y="262" width="244" height="60" fill="black" rx="2"/>
  </mask>
</defs>

<!-- Crop guide -->
<circle cx="340" cy="210" r="160" fill="none" stroke="rgba(222, 220, 209, 0.12)" stroke-width="1" stroke-dasharray="2 4"/>

<g clip-path="url(#cropOrn)">
  <!-- Background: CypherGoat near-black -->
  <circle cx="340" cy="210" r="160" fill="#0c0e14"/>

  <!-- ============ ASYMMETRIC RIM ORNAMENTATION ============ -->

  <!-- Outer ring -->
  <circle cx="340" cy="210" r="150" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="0.6"/>

  <!-- Inner broken arc, gap upper-right -->
  <path d="M 411 87 A 142 142 0 1 1 291.4 76.5" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="0.5"/>

  <!-- Short detached accent arc, upper-left -->
  <path d="M 207.7 148.3 A 146 146 0 0 1 246.1 98.2" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Scattered tick marks: irregular density and lengths -->
  <g transform="translate(340 210)" stroke="#ffffff" stroke-linecap="round">
    <line x1="0" y1="-150" x2="0" y2="-143" transform="rotate(8)" stroke-width="0.6" stroke-opacity="0.38"/>
    <line x1="0" y1="-150" x2="0" y2="-141" transform="rotate(20)" stroke-width="0.7" stroke-opacity="0.42"/>

    <line x1="0" y1="-150" x2="0" y2="-144" transform="rotate(55)" stroke-width="0.5" stroke-opacity="0.32"/>
    <line x1="0" y1="-150" x2="0" y2="-142" transform="rotate(72)" stroke-width="0.6" stroke-opacity="0.38"/>

    <line x1="0" y1="-150" x2="0" y2="-143" transform="rotate(108)" stroke-width="0.6" stroke-opacity="0.38"/>
    <line x1="0" y1="-150" x2="0" y2="-140" transform="rotate(115)" stroke-width="0.7" stroke-opacity="0.42"/>
    <line x1="0" y1="-150" x2="0" y2="-145" transform="rotate(122)" stroke-width="0.5" stroke-opacity="0.32"/>

    <line x1="0" y1="-150" x2="0" y2="-142" transform="rotate(125)" stroke-width="0.6" stroke-opacity="0.38"/>
    <line x1="0" y1="-150" x2="0" y2="-144" transform="rotate(132)" stroke-width="0.5" stroke-opacity="0.32"/>

    <!-- Bottom region (rot ~150-235°) intentionally clear — curved text sits here -->

    <line x1="0" y1="-150" x2="0" y2="-143" transform="rotate(258)" stroke-width="0.6" stroke-opacity="0.38"/>
    <line x1="0" y1="-150" x2="0" y2="-145" transform="rotate(275)" stroke-width="0.5" stroke-opacity="0.28"/>
  </g>

  <!-- Asymmetric compass marks -->
  <g transform="translate(340 210)">
    <line x1="0" y1="-156" x2="0" y2="-136" transform="rotate(312)" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="0" cy="-148" r="1.7" transform="rotate(312)" fill="#ffffff"/>

    <line x1="0" y1="-152" x2="0" y2="-140" transform="rotate(40)" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round"/>

    <line x1="0" y1="-150" x2="0" y2="-143" transform="rotate(98)" stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-opacity="0.8"/>

    <circle cx="0" cy="-146" r="1.3" transform="rotate(245)" fill="#ffffff" fill-opacity="0.75"/>
  </g>

  <!-- Off-center scattered dot trio (top-right interior) -->
  <g fill="#ffffff" fill-opacity="0.35">
    <circle cx="446" cy="118" r="1.1"/>
    <circle cx="453" cy="127" r="0.7"/>
    <circle cx="438" cy="131" r="0.9"/>
  </g>

  <!-- Tiny "+" punctuation, mid-left interior (moved up to clear curved text zone) -->
  <g stroke="#ffffff" stroke-opacity="0.28" stroke-width="0.6" stroke-linecap="round">
    <line x1="222" y1="200" x2="230" y2="200"/>
    <line x1="226" y1="196" x2="226" y2="204"/>
  </g>

  <!-- ============ CENTER CONTENT ============ -->

  <!-- Top tag: asymmetric ornaments — dot left, dash + diamond right -->
  <g fill="#9c9a92">
    <circle cx="248" cy="126" r="1.4"/>
    <line x1="423" y1="126" x2="431" y2="126" stroke="#9c9a92" stroke-width="1" stroke-linecap="round"/>
    <polygon points="437,122 440,126 437,130 434,126"/>
  </g>
  <text x="340" y="130" text-anchor="middle" font-family="'Anthropic Sans', sans-serif" font-size="11" font-weight="500" fill="#9c9a92" letter-spacing="0.5">WEEKLY DIGEST</text>

  <!-- Stacked title — larger -->
  <text x="340" y="197" text-anchor="middle" font-family="'Anthropic Sans', sans-serif" font-size="52" font-weight="500" fill="#ffffff">This Week</text>
  <text x="340" y="249" text-anchor="middle" font-family="'Anthropic Sans', sans-serif" font-size="52" font-weight="500" fill="#ffffff">in&#160;<tspan font-weight="600">Monero</tspan></text>

  <!-- Asymmetric divider, repositioned below larger title -->
  <line x1="278" y1="272" x2="332" y2="272" stroke="#ffffff" stroke-width="1.4" mask="url(#text-gaps)"/>
  <polygon points="338,267 343,272 338,277 333,272" fill="#ffffff"/>
  <line x1="349" y1="272" x2="416" y2="272" stroke="#ffffff" stroke-width="1.4" mask="url(#text-gaps)"/>
  <circle cx="422" cy="272" r="1.4" fill="#ffffff"/>
  <circle cx="428" cy="272" r="0.9" fill="#ffffff" fill-opacity="0.6"/>

  <!-- Bottom: TWIM acronym -->
  <text x="340" y="294" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="500" fill="#9c9a92" letter-spacing="0.5">T · W · I · M</text>

  <!-- Curved bottom rim text -->
  <text font-family="'Anthropic Sans', sans-serif" font-size="9.5" font-weight="500" fill="#ffffff" letter-spacing="1.2">
    <textPath href="#bottom-arc" startOffset="50%" text-anchor="middle">PRIVACY · TRANSPARENCY · COMMUNITY</textPath>
  </text>
</g>

</svg>
